# Supabase local development config
# Run: supabase start

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3001",
  "http://localhost:3002",
  "http://localhost:3003",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # Set true in production

[auth.external.google]
enabled = false  # Set to true and add client_id/secret to enable Google OAuth
# client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
